<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師時間表系統</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --free-bg: #d4edda;
            --free-color: #155724;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
        }
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        select, input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            max-width: 300px;
            cursor: pointer;
        }
        /* 功能選單區 */
        .options-panel {
            display: flex;
            gap: 20px;
            background: #eef2f5;
            padding: 15px 25px;
            border-radius: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .checkbox-label {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #upload-section {
            display: none;
            background: #ffeeba;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        #status-msg {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* 表格與手機版優化 */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px; /* 手機上維持表格形狀，可橫滑 */
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: center;
            vertical-align: middle;
            word-wrap: break-word;
            height: 40px;
        }
        td:first-child, th:first-child {
            position: sticky;
            left: 0;
            background-color: #eef2f5;
            font-weight: bold;
            z-index: 1;
            border-right: 2px solid #ccc;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        /* 空堂突顯樣式 */
        .is-free-period {
            background-color: var(--free-bg) !important;
            color: var(--free-color);
            font-weight: bold;
        }
        /* 休息/午膳時間淡化 */
        .is-break-time {
            background-color: #f1f1f1 !important;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍🏫 教師時間表查詢系統</h1>
    
    <div id="status-msg">系統正在嘗試讀取預設時間表...</div>

    <div class="controls-wrapper">
        <div id="upload-section">
            <p>⚠️ 找不到預設檔案 (Teacher_Timetable.xlsx)<br>請在此手動上載 Excel 檔案：</p>
            <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
        </div>
