<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師時間表系統</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        select, input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-width: 100%;
        }
        select {
            width: 100%;
            max-width: 300px;
            cursor: pointer;
        }
        #upload-section {
            display: none; /* 預設隱藏，找不到檔案才顯示 */
            background: #ffeeba;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        #status-msg {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* 表格與手機版優化 (響應式設計) */
        .table-wrapper {
            overflow-x: auto; /* 手機版可左右滑動 */
            -webkit-overflow-scrolling: touch;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px; /* 強制最小寬度，保持表格形狀 */
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: center;
            vertical-align: middle;
            word-wrap: break-word;
        }
        /* 固定第一欄 (時間欄) */
        td:first-child, th:first-child {
            position: sticky;
            left: 0;
            background-color: #eef2f5;
            font-weight: bold;
            z-index: 1;
            border-right: 2px solid #ccc;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        /* 簡單的按鈕樣式 */
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍🏫 教師時間表查詢系統</h1>
    
    <div id="status-msg">系統正在嘗試讀取預設時間表...</div>

    <div class="controls">
        <div id="upload-section">
            <p>⚠️ 找不到預設檔案 (Teacher_Timetable.xlsx)<br>請聯絡管理員，或在此手動上載 Excel 檔案：</p>
            <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
        </div>

        <select id="teacher-select" style="display: none;">
            <option value="">-- 請選擇教師 --</option>
        </select>
    </div>

    <div class="table-wrapper">
        <div id="timetable-container"></div>
    </div>
</div>

<script>
    let currentWorkbook = null;
    const defaultFileName = 'Teacher_Timetable.xlsx'; // 預設讀取的檔案名

    // 網頁載入後立即執行
    window.onload = async function() {
        try {
            // 嘗試從伺服器讀取預設 Excel 檔
            const response = await fetch(defaultFileName);
            if (!response.ok) throw new Error('File not found');
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            processExcelData(data);
            document.getElementById('status-msg').innerText = "✅ 成功載入預設時間表！請選擇教師。";
            
        } catch (error) {
            console.log("找不到預設檔案，啟動手動上載模式");
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('upload-section').style.display = 'block';
        }
    };

    // 處理手動上載的檔案
    document.getElementById('excel-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            processExcelData(data);
            document.getElementById('status-msg').style.display = 'block';
            document.getElementById('status-msg').innerText = "✅ 檔案上載成功！請選擇教師。";
            document.getElementById('upload-section').style.display = 'none'; // 隱藏上載區
        };
        reader.readAsArrayBuffer(file);
    });

    // 解析 Excel 數據
    function processExcelData(data) {
        currentWorkbook = XLSX.read(data, {type: 'array'});
        
        const selectElement = document.getElementById('teacher-select');
        selectElement.innerHTML = '<option value="">-- 請選擇教師 --</option>'; // 清空重置
        
        // 假設每一個 Sheet (工作表) 就是一位老師的名字
        currentWorkbook.SheetNames.forEach(sheetName => {
            let option = document.createElement('option');
            option.value = sheetName;
            option.text = sheetName;
            selectElement.appendChild(option);
        });

        selectElement.style.display = 'block'; // 顯示選單
    }

    // 當選擇不同老師時，更新表格
    document.getElementById('teacher-select').addEventListener('change', function(e) {
        const sheetName = e.target.value;
        const container = document.getElementById('timetable-container');
        
        if (!sheetName) {
            container.innerHTML = '';
            return;
        }

        // 將選定的 Sheet 直接轉換為 HTML 表格
        const worksheet = currentWorkbook.Sheets[sheetName];
        let htmlTable = XLSX.utils.sheet_to_html(worksheet, { id: "data-table", editable: false });
        
        // 清理空行 (可選，讓表格更美觀)
        htmlTable = htmlTable.replace(/<tr><td[^>]*><\/td><\/tr>/g, "");
        
        container.innerHTML = htmlTable;
    });
</script>

</body>
</html>
