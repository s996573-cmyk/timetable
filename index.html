<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教師時間表 (手機網上版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2b5797;
            --secondary: #eff4ff;
            --accent: #27ae60;
            --bg: #f5f6fa;
            --text: #2f3640;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); padding-bottom: 30px; }
        
        /* 頂部導航列 */
        .navbar {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 狀態列與手動上傳區 */
        .status-area { padding: 15px; text-align: center; font-size: 14px; }
        .fallback-upload { display: none; margin-top: 10px; padding: 15px; background: white; border-radius: 8px; border: 1px dashed #ccc; }
        
        /* 控制面板 */
        .controls {
            padding: 15px;
            background: white;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        /* 擴展功能開關 */
        .toggle-s6 {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffeeba;
            font-size: 14px; font-weight: bold; color: #856404; margin-bottom: 10px;
        }
        
        /* 時間表卡片列表 */
        .schedule-container { padding: 0 10px; }
        .period-card {
            display: flex;
            background: white;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border-left: 5px solid var(--primary);
        }
        .period-card.free { border-left-color: var(--accent); }
        .period-card.break { border-left-color: #f39c12; background: #fdfae6; }
        
        .time-col {
            width: 85px;
            background: var(--secondary);
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            text-align: center;
            border-right: 1px solid #eaeaea;
        }
        .content-col {
            flex: 1;
            padding: 15px;
            font-size: 15px;
            display: flex;
            align-items: center;
            line-height: 1.4;
        }
        
        /* 狀態文字樣式 */
        .text-free { color: var(--accent); font-weight: bold; font-size: 16px; }
        .text-break { color: #d35400; font-weight: bold; }
        .s6-freed { color: #95a5a6; }
        .s6-freed-badge { display: inline-block; background: #ecf0f1; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-top: 4px; color: #7f8c8d; }
        .s6-strike { text-decoration: line-through; }

        /* 隱藏預設元件，待載入後顯示 */
        #appContent { display: none; }
        .loading-spinner { font-size: 24px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="navbar">
        教師時間表系統 📱
    </div>

    <div class="status-area" id="statusArea">
        <div class="loading-spinner">🔄</div><br>
        <strong id="statusText">正在嘗試連線獲取學校時間表...</strong>
        
        <div class="fallback-upload" id="fallbackUpload">
            <p style="color: #e74c3c;">找不到線上資料檔，請手動上傳 Excel 檔案</p>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="width:100%; padding:10px; border:1px solid #ccc;">
        </div>
    </div>

    <div id="appContent">
        <div class="controls">
            <div class="input-group">
                <label>👤 選擇教師</label>
                <select id="teacherSelect">
                    <option value="">-- 請先選擇老師 --</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>📅 選擇循環週 (Day)</label>
                <select id="daySelect">
                    <option value="1">Day 1</option>
                    <option value="2">Day 2</option>
                    <option value="3">Day 3</option>
                    <option value="4">Day 4</option>
                    <option value="5">Day 5</option>
                    <option value="6">Day 6</option>
                    <option value="7">Day 7</option>
                </select>
            </div>

            <label class="toggle-s6">
                <span>啟用「中六完課空堂」模式</span>
                <input type="checkbox" id="s6ModeToggle" style="transform: scale(1.3);">
            </label>
        </div>

        <div class="schedule-container" id="scheduleList">
            </div>
    </div>

    <script>
        const teacherData = {};
        let dayHeaders = []; // 儲存 Day 1, Day 2 等標題的欄位索引
        
        // 系統啟動時，優先嘗試用 Fetch API 讀取同目錄下的 Excel 檔
        // (檔名必須命名為 Teacher_Timetable.xlsx)
        window.onload = function() {
            fetch('Teacher_Timetable.xlsx')
                .then(response => {
                    if (!response.ok) throw new Error('檔案不存在');
                    return response.arrayBuffer();
                })
                .then(data => {
                    processExcelData(new Uint8Array(data));
                })
                .catch(err => {
                    console.warn("無法自動獲取線上資料，切換為手動模式:", err);
                    document.getElementById('statusText').innerText = "連線失敗，進入離線模式";
                    document.querySelector('.loading-spinner').style.display = 'none';
                    document.getElementById('fallbackUpload').style.display = 'block';
                });
        };

        // 綁定手動上傳事件
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('statusText').innerText = "檔案讀取中...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                processExcelData(new Uint8Array(event.target.result));
            };
            reader.readAsArrayBuffer(file);
        });

        // 處理 Excel 資料的核心邏輯
        function processExcelData(data) {
            try {
                const workbook = XLSX.read(data, {type: 'array'});
                let sheetsProcessed = 0;
                for (let key in teacherData) delete teacherData[key];

                workbook.SheetNames.forEach(sheetName => {
                    const worksheet = workbook.Sheets[sheetName];
                    const parsedData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});

                    let headerIndex = -1;
                    for (let i = 0; i < parsedData.length; i++) {
                        if (parsedData[i].some(cell => String(cell).includes('Day 1') || String(cell).includes('Day 2'))) {
                            headerIndex = i;
                            // 記錄第一位老師的表頭，用來抓 Day 1~7 的欄位位置
                            if (sheetsProcessed === 0) {
                                dayHeaders = parsedData[i]; 
                            }
                            break;
                        }
                    }

                    if (headerIndex !== -1) {
                        const teacherName = sheetName.trim();
                        teacherData[teacherName] = parsedData.slice(headerIndex);
                        sheetsProcessed++;
                    }
                });

                if (sheetsProcessed > 0) {
                    document.getElementById('statusArea').style.display = 'none';
                    document.getElementById('appContent').style.display = 'block';
                    initUI();
                }
            } catch (error) {
                console.error(error);
                document.getElementById('statusText').innerText = "資料解析失敗，請確認 Excel 格式。";
            }
        }

        // 初始化 UI (選單)
        function initUI() {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = '<option value="">-- 請選擇老師 --</option>';
            
            Object.keys(teacherData).sort().forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });

            // 綁定選單事件
            document.getElementById('teacherSelect').addEventListener('change', renderMobileSchedule);
            document.getElementById('daySelect').addEventListener('change', renderMobileSchedule);
            document.getElementById('s6ModeToggle').addEventListener('change', renderMobileSchedule);
        }

        // 判斷是否為中六課堂
        function isS6Class(text) {
            if (!text) return false;
            return /6[A-Za-z]|中六/.test(String(text).trim());
        }

        // 渲染手機版直向列表
        function renderMobileSchedule() {
            const teacherName = document.getElementById('teacherSelect').value;
            const targetDay = "Day " + document.getElementById('daySelect').value;
            const s6Mode = document.getElementById('s6ModeToggle').checked;
            const container = document.getElementById('scheduleList');
            
            container.innerHTML = '';
            
            if (!teacherName) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:#7f8c8d;">請從上方選擇老師 👆</div>';
                return;
            }

            const rawData = teacherData[teacherName];
            if (!rawData) return;

            // 尋找目標 Day 在陣列中的索引位置 (通常 Day 1 在 index 1)
            let dayIndex = dayHeaders.findIndex(h => String(h).trim() === targetDay);
            if(dayIndex === -1) dayIndex = parseInt(document.getElementById('daySelect').value); // 備用方案

            let html = '';
            
            // 略過第 0 列 (表頭)
            for (let i = 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (row.every(cell => String(cell).trim() === '')) continue; // 略過完全空白行

                const timeSlot = String(row[0] || '').replace(/\n/g, '<br>');
                let classInfo = String(row[dayIndex] || '').trim();
                let cardClass = '';
                let displayContent = classInfo.replace(/\n/g, '<br>');

                // 判斷特殊時段
                const isBreak = ['Morning Assembly', 'Recess', 'Lunch', 'Roll Call'].includes(String(row[1] || '').trim());
                
                if (isBreak) {
                    cardClass = 'break';
                    displayContent = `<span class="text-break">${String(row[1] || '').trim()}</span>`;
                } 
                else if (classInfo === '') {
                    cardClass = 'free';
                    displayContent = '<span class="text-free">✅ 空堂</span>';
                } 
                else if (s6Mode && isS6Class(classInfo)) {
                    // 中六釋放為空堂
                    cardClass = 'free';
                    displayContent = `
                        <div class="s6-freed">
                            <span class="s6-strike">${displayContent}</span><br>
                            <span class="s6-freed-badge">✅ 中六完課釋放</span>
                        </div>`;
                }

                html += `
                <div class="period-card ${cardClass}">
                    <div class="time-col">${timeSlot}</div>
                    <div class="content-col">${displayContent}</div>
                </div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
